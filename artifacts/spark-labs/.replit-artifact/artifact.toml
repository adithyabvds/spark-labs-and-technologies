kind = "web"
previewPath = "/"
title = "Spark Labs & Technologies"
version = "1.0.0"
id = "artifacts/spark-labs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22625
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/spark-labs run dev"

[services.env]
PORT = "22625"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/spark-labs", "run", "build"]
publicDir = "artifacts/spark-labs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
